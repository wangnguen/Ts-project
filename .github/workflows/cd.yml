name: CD

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.vscode/**'
      - '.editorconfig'

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/api-ecommerce

jobs:
  ci-check:
    name: CI Checks
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  docker:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest
    needs: ci-check
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: docker
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Copy config files to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: 'docker-compose.prod.yml,infra/nginx/api-ts.conf'
          target: '/srv/app/ts-backend'
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            mkdir -p /srv/app/ts-backend/infra/nginx
            cd /srv/app/ts-backend

            # Check .env exists
            if [ ! -f .env ]; then
              echo "ERROR: .env file not found!"
              echo "Please create .env file manually on VPS"
              exit 1
            fi

            # Pull and deploy
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/api-ecommerce:latest
            docker compose -f docker-compose.prod.yml down 2>/dev/null || true
            docker compose -f docker-compose.prod.yml up -d

            # Check and update nginx config if changed
            NEW_CHECKSUM=$(md5sum infra/nginx/api-ts.conf 2>/dev/null | awk '{print $1}')
            OLD_CHECKSUM=""

            if [ -f /etc/nginx/sites-available/api-ts ]; then
              OLD_CHECKSUM=$(md5sum /etc/nginx/sites-available/api-ts | awk '{print $1}')
            fi

            if [ "$NEW_CHECKSUM" != "$OLD_CHECKSUM" ] && [ ! -z "$NEW_CHECKSUM" ]; then
              echo "Updating nginx config..."
              cp infra/nginx/api-ts.conf /etc/nginx/sites-available/api-ts
              ln -sf /etc/nginx/sites-available/api-ts /etc/nginx/sites-enabled/api-ts
              nginx -t && systemctl reload nginx
              echo "✅ Nginx config updated"
            else
              echo "✅ Nginx config unchanged"
            fi

            docker image prune -f

  notify:
    name: Telegram Notification
    runs-on: ubuntu-latest
    needs: [ci-check, docker, deploy]
    if: always()
    steps:
      - name: Set result status
        id: status
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "emoji=✅" >> $GITHUB_OUTPUT
            echo "text=SUCCESS" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "text=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          format: markdown
          disable_web_page_preview: true
          message: |
            ${{ steps.status.outputs.emoji }} *CD ${{ steps.status.outputs.text }}*

            *Project:* `api-ecommerce`
            *Branch:* `${{ github.ref_name }}`
            *Commit:* `${{ github.event.head_commit.message }}`
            *Pushed by:* `${{ github.actor }}`

            *Docker Image:*
            `${{ env.IMAGE_NAME }}:latest`

            [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
